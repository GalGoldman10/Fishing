# https://supabase.com/docs/guides/local-development/cli/config
project_id = "fishguide-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

[analytics]
enabled = false
port = 54327
backend = "postgres"

[functions.fishing-assistant]
verify_jwt = false

[functions.fish-identify]
verify_jwt = false

[functions.fishing-research]
verify_jwt = false

[functions.web-search]
verify_jwt = false

[functions.marine-conditions]
verify_jwt = false

[functions.place-enrichment]
verify_jwt = false

[functions.trip-notifications]
verify_jwt = false

[functions.account-delete]
verify_jwt = false
