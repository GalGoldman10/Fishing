# A string used to distinguish Supabase projects on the same host. Defaults to the workspace folder name.
project_id = "fishguide-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"

[functions.fishing-assistant]
verify_jwt = false

[functions.fishing-research]
verify_jwt = false

[functions.web-search]
verify_jwt = false

[functions.marine-conditions]
verify_jwt = false

[functions.place-enrichment]
verify_jwt = false

[functions.trip-notifications]
verify_jwt = false

[functions.account-delete]
verify_jwt = false
