name: Refresh bot sources

on:
  schedule:
    # Daily at 03:15 UTC (06:15 Israel time)
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-sources
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest source content
        run: node scripts/refresh-sources.mjs

      - name: Commit updated content
        id: commit
        run: |
          if git diff --quiet -- lib/research/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Source content unchanged — nothing to deploy."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add lib/research/data
            git commit -m "chore: refresh bot source content (automated)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Pushes made with GITHUB_TOKEN do not trigger the regular deploy workflow,
  # so this workflow rebuilds and deploys the site itself when content changed.
  build:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web app
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_USE_MOCK_DATA: "true"
          EXPO_PUBLIC_APP_ENV: production

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
