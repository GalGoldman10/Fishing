name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          echo "Workflow commit: ${{ github.sha }}"

          unset SUPABASE_PROJECT_REF SUPABASE_URL SUPABASE_DB_PORT SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY 2>/dev/null || true

          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          if [ -z "$PROJECT_REF" ]; then
            echo "Missing GitHub secret SUPABASE_PROJECT_REF (use: jtsjetxvvdckjyqdmrow)"
            exit 1
          fi

          supabase --version
          echo "Deploying to project ref: $PROJECT_REF"

          supabase functions deploy fishing-assistant --project-ref "$PROJECT_REF" --no-verify-jwt
          supabase functions deploy fishing-research --project-ref "$PROJECT_REF" --no-verify-jwt
          supabase functions deploy web-search --project-ref "$PROJECT_REF" --no-verify-jwt
