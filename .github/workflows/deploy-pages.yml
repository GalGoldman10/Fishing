name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web app
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_USE_MOCK_DATA: "true"
          EXPO_PUBLIC_APP_ENV: production
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      # Single-page app fallback: GitHub Pages serves 404.html for unknown
      # paths, which lets expo-router handle deep links client-side.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment-retry
        if: steps.deployment.outcome != 'success'
        uses: actions/deploy-pages@v4
      - name: Verify Pages deployment
        run: |
          if [ "${{ steps.deployment.outcome }}" != "success" ] && [ "${{ steps.deployment-retry.outcome }}" != "success" ]; then
            echo "Pages deployment failed after retry — try re-running the workflow."
            exit 1
          fi
